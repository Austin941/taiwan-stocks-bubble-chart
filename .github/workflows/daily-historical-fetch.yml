name: Daily Historical Ranking Fetch

on:
  schedule:
    # Run at 12:00 UTC every weekday (Monday-Friday)
    # 12:00 UTC = 20:00 Taiwan Time (After Yahoo historical data is fully updated)
    - cron: '0 12 * * 1-5'
  workflow_dispatch: # Allow manual trigger

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Run Fetch Script
      run: node scripts/fetch_historical_ranking.js
      env:
        NODE_ENV: production

    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add public/historical_ranking.json
        # Only commit if there are changes
        git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-update historical ranking data" && git push)
