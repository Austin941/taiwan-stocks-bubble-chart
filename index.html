<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>台股族群動態分析</title>
  <link rel="stylesheet" href="./style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <h1>台股動態排行與族群分析</h1>
      <p class="subtitle">洞察全市場成交重心與各族群資金流向</p>
      <div id="last-updated" style="margin-top:0.5rem; font-size:0.9rem; color:var(--accent-color); font-variant-numeric: tabular-nums;">
        最後更新時間：載入中...
      </div>
    </header>
    
    <main class="main-content">
      
      <!-- 總表視圖 (Master View) -->
      <section id="view-ranking" class="view active">
        <div class="panel-glass">
          <div class="panel-header">
            <h2>全市場成交金額排行 (即時資料)</h2>
            <p>點擊「產業別」標籤即可查看該族群的泡泡圖分析</p>
          </div>
          <div class="table-responsive">
            <table class="ranking-table">
              <thead>
                <tr>
                  <th>排名</th>
                  <th>產業別</th>
                  <th class="text-right sortable" data-sort="return">
                    族群平均漲幅 
                    <span class="sort-icon" id="sort-return"></span>
                  </th>
                  <th class="text-right sortable" data-sort="volume">
                    總成交量 (張) 
                    <span class="sort-icon" id="sort-volume"></span>
                  </th>
                  <th class="text-right sortable" data-sort="amount" data-active="true" data-order="desc">
                    總成交額 (億) 
                    <span class="sort-icon desc" id="sort-amount">▼</span>
                  </th>
                </tr>
              </thead>
              <tbody id="rankingTableBody">
                <tr><td colspan="5" class="text-center">資料載入中...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </section>

      <!-- 泡泡圖視圖 (Detail View) -->
      <section id="view-chart" class="view hidden">
        <div class="controls-glass">
          <button id="backBtn" class="btn-secondary">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            返回總表
          </button>
          
          <div class="control-group">
            <h2 id="currentSectorTitle" style="color:var(--text-primary); font-size:1.8rem;">載入中...</h2>
          </div>
        </div>

        <div class="chart-container-glass">
          <div class="y-axis-title">當日報酬率</div>
          <canvas id="bubbleChart"></canvas>
        </div>

        <div class="info-panel">
          <h3>圖表說明</h3>
          <ul>
            <li><strong>X 軸</strong>：成交量 (即時)</li>
            <li><strong>Y 軸</strong>：當日報酬率 % (即時)</li>
            <li><strong>氣泡大小</strong>：成交金額 (即時)</li>
            <li><strong>顏色</strong>：<span style="color:var(--positive-color);font-weight:bold;">紅色</span>代表上漲，<span style="color:var(--negative-color);font-weight:bold;">綠色</span>代表下跌</li>
          </ul>
        </div>
      </section>

    </main>
  </div>
  
  <script type="module" src="./main.js"></script>
</body>
</html>
