<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>台股全方位儀表板</title>
  <link rel="stylesheet" href="./style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="tv-layout">
    <!-- Header -->
    <header class="tv-header panel-glass">
      <div class="header-left">
        <h1>台股全方位儀表板</h1>
        <span class="subtitle">族群動能與技術分析</span>
      </div>
      <div class="header-right">
        <span id="last-updated" class="last-updated">資料載入中...</span>
      </div>
    </header>

    <!-- Main Workspace -->
    <div class="tv-workspace">
      
      <!-- LEFT: Main Chart Area -->
      <div class="tv-main-panel panel-glass">
        <!-- Top Toolbar -->
        <div class="tv-main-toolbar">
          <div class="toolbar-left">
             <h2 id="tv-main-title">全市場族群泡泡圖</h2>
             <span id="tv-main-subtitle" class="subtitle"></span>
          </div>
          <div class="toolbar-right">
            <!-- Period buttons for Bubble Chart -->
            <div id="bubble-period-selector" class="period-selector">
              <button class="period-btn active" data-days="1">1日</button>
              <button class="period-btn" data-days="5">5日</button>
              <button class="period-btn" data-days="10">10日</button>
              <button class="period-btn" data-days="20">20日</button>
            </div>
            <!-- Interval buttons for Tech Chart -->
            <div id="tech-interval-selector" class="interval-group hidden">
              <button class="interval-btn" data-interval="5">5分</button>
              <button class="interval-btn" data-interval="60">60分</button>
              <button class="interval-btn active" data-interval="D">日K</button>
              <button class="interval-btn" data-interval="W">週K</button>
              <button class="interval-btn" data-interval="M">月K</button>
            </div>
            <button id="back-to-bubble-btn" class="btn-secondary hidden">返回泡泡圖</button>
          </div>
        </div>

        <!-- Content Views -->
        <div class="tv-main-content">
          <!-- 1. Bubble Chart View -->
          <div id="bubble-chart-view" class="chart-wrapper">
             <div id="chart-loading-overlay" class="chart-loading-overlay hidden">
               <div class="spinner"></div><div class="loading-text">計算歷史數據中...</div>
             </div>
             <!-- The canvas itself -->
             <div class="canvas-container" style="flex: 1; min-height: 400px; position: relative;">
                 <canvas id="bubbleChart"></canvas>
             </div>
             
             <!-- Detail Table (Bottom of bubble chart) -->
             <div id="detail-table-wrapper" class="detail-table-wrapper hidden">
               <h3>成分股明細</h3>
               <div class="table-responsive">
                 <table class="ranking-table detail-table">
                   <thead>
                     <tr>
                       <th class="sortable detail-sortable" data-sort="symbol">股票名稱 <span class="sort-icon" id="detail-sort-symbol"></span></th>
                       <th class="text-right sortable detail-sortable" data-sort="return">漲跌幅(%) <span class="sort-icon" id="detail-sort-return"></span></th>
                       <th class="text-right sortable detail-sortable" data-sort="volume">成交量(張) <span class="sort-icon" id="detail-sort-volume"></span></th>
                       <th class="text-right sortable detail-sortable" data-sort="amount" data-active="true" data-order="desc">成交金額(億) <span class="sort-icon desc" id="detail-sort-amount">↓</span></th>
                     </tr>
                   </thead>
                   <tbody id="detailTableBody"></tbody>
                 </table>
               </div>
             </div>
          </div>

          <!-- 2. Technical Analysis View (TradingView) -->
          <div id="tech-chart-view" class="chart-wrapper hidden" style="display: flex; flex-direction: column;">
             <div id="tradingview-widget-container" style="flex: 1; min-height: 500px; border-radius: 8px; overflow: hidden;"></div>
             <!-- Stock Details (Tags) underneath the chart -->
             <div class="stock-meta-panel" style="margin-top:1rem;">
                <div class="meta-row" style="margin-bottom:0.5rem;">
                  <span class="meta-label">所屬產業:</span>
                  <div id="tech-sector-tags" class="tag-container" style="display:inline-flex;"></div>
                </div>
                <div class="meta-row">
                  <span class="meta-label">概念題材:</span>
                  <div id="tech-theme-tags" class="tag-container" style="display:inline-flex;"></div>
                </div>
             </div>
          </div>
        </div>
      </div>

      <!-- RIGHT: Sidebar Panels -->
      <div class="tv-sidebar panel-glass">
        <!-- Sidebar Tabs -->
        <div class="sidebar-tabs">
          <button class="sidebar-tab active" data-target="view-ranking">產業</button>
          <button class="sidebar-tab" data-target="view-theme">題材</button>
          <button class="sidebar-tab" data-target="view-radar">熱門</button>
        </div>

        <div class="sidebar-content">
           <!-- Ranking View -->
           <div id="view-ranking" class="sidebar-view">
             <div class="table-responsive">
             <table class="ranking-table">
               <thead>
                 <tr>
                   <th>族群</th>
                   <th class="text-right sortable" data-sort="return">漲跌<span class="sort-icon" id="sort-return"></span></th>
                   <th class="text-right sortable" data-sort="amount" data-active="true" data-order="desc">金額(億)<span class="sort-icon desc" id="sort-amount">↓</span></th>
                 </tr>
               </thead>
               <tbody id="rankingTableBody_1"><tr><td colspan="3" class="text-center">載入中...</td></tr></tbody>
               <tbody id="rankingTableBody_5" class="hidden"><tr><td colspan="3" class="text-center">載入中...</td></tr></tbody>
               <tbody id="rankingTableBody_10" class="hidden"><tr><td colspan="3" class="text-center">載入中...</td></tr></tbody>
               <tbody id="rankingTableBody_20" class="hidden"><tr><td colspan="3" class="text-center">載入中...</td></tr></tbody>
             </table>
             </div>
           </div>
           
           <!-- Theme View -->
           <div id="view-theme" class="sidebar-view hidden">
             <div class="table-responsive">
             <table class="ranking-table">
               <thead>
                 <tr>
                   <th>題材</th>
                   <th class="text-right theme-sortable" data-sort="return">漲跌<span class="sort-icon" id="theme-sort-return"></span></th>
                   <th class="text-right theme-sortable" data-sort="amount" data-active="true" data-order="desc">金額(億)<span class="sort-icon desc" id="theme-sort-amount">↓</span></th>
                 </tr>
               </thead>
               <tbody id="themeRankingTableBody_1"><tr><td colspan="3" class="text-center">載入中...</td></tr></tbody>
               <tbody id="themeRankingTableBody_5" class="hidden"><tr><td colspan="3" class="text-center">載入中...</td></tr></tbody>
               <tbody id="themeRankingTableBody_10" class="hidden"><tr><td colspan="3" class="text-center">載入中...</td></tr></tbody>
               <tbody id="themeRankingTableBody_20" class="hidden"><tr><td colspan="3" class="text-center">載入中...</td></tr></tbody>
             </table>
             </div>
           </div>

           <!-- Radar View -->
           <div id="view-radar" class="sidebar-view hidden">
             <div class="table-responsive">
             <table class="ranking-table radar-table">
               <thead>
                 <tr>
                   <th>股票名稱</th>
                   <th class="text-right radar-sortable" data-sort="return">漲跌<span class="sort-icon" id="radar-sort-return"></span></th>
                   <th class="text-right radar-sortable" data-sort="amount" data-active="true" data-order="desc">金額(億)<span class="sort-icon desc" id="radar-sort-amount">↓</span></th>
                 </tr>
               </thead>
               <tbody id="radarTableBody_1"><tr><td colspan="3" class="text-center">載入中...</td></tr></tbody>
               <tbody id="radarTableBody_5" class="hidden"><tr><td colspan="3" class="text-center">載入中...</td></tr></tbody>
               <tbody id="radarTableBody_10" class="hidden"><tr><td colspan="3" class="text-center">載入中...</td></tr></tbody>
               <tbody id="radarTableBody_20" class="hidden"><tr><td colspan="3" class="text-center">載入中...</td></tr></tbody>
             </table>
             </div>
           </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Custom Chart Tooltip -->
  <div id="chart-tooltip" class="chart-tooltip"></div>

  <!-- External Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
  <script src="https://s3.tradingview.com/tv.js"></script>
  
  <!-- App Scripts -->
  <script type="module" src="/src/ui.js"></script>
  <script type="module" src="/src/api.js"></script>
  <script type="module" src="./main.js"></script>
</body>
</html>
